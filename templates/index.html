<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Draw a number between 0 and 9</h1>
    <canvas id="canvas" width="280" height="280" style=
       "border: 2px solid white;
        background-color: black;
        cursor: crosshair;"></canvas>

    
<button id="predict">Predict</button>


<button id="clear">Clear</button>

<h2 id="result"></h2>


<script>
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    let isDrawing = false

    ctx.strokeStyle = 'white'
    ctx.lineWidth = 20
    ctx.lineCap = 'round'
    ctx.lineJoin = 'round'

    canvas.addEventListener('mousedown', (e) => {
        isDrawing = true
        ctx.beginPath()
        ctx.moveTo(e.offsetX, e.offsetY)
    })

    canvas.addEventListener('mouseup', () => {
        isDrawing = false
        ctx.beginPath()
    })

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return
        ctx.lineTo(e.offsetX, e.offsetY)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(e.offsetX, e.offsetY)
    })

    document.getElementById('clear').addEventListener('click', () => {
        ctx.fillStyle = 'black'
        ctx.fillRect(0, 0, canvas.width, canvas.height)
        document.getElementById('result').innerText = 'Draw a number and click Predict!'
    })

    document.getElementById('predict').addEventListener('click', () => {
        const imageData = canvas.toDataURL('image/png').split(',')[1]
        fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({image: imageData})
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('result').innerText = 'Predicted: ' + data.digit
        })
    })

</script>
    
</body>
</html>
